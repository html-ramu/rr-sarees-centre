<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RR Sarees - Admin Panel</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>🔒 Admin Login</h2>
    <input type="email" id="login-email" placeholder="Email Address">
    <input type="password" id="login-password" placeholder="Password">
    <button id="login-btn">Login</button>
    <p id="login-error"></p>
  </div>
</div>

<div class="container" id="main-admin-container">
  
  <div class="header-area">
    <h1>🛍️ RR Sarees Center</h1>
    <div class="header-actions">
      <button id="migration-btn" class="btn btn-warning" title="Click this once to fix old single-image products">⚙️ Fix Legacy Data</button>
      <button id="logout-btn" class="btn">Logout</button>
    </div>
  </div>

  <div class="upload-form">
    <h2>➕ Add New Product (With Colors)</h2>
    <div id="status-msg" class="status-msg"></div>

    <div class="form-group">
      <label>Section</label>
      <select id="product-section">
        <option value="">-- Select Section --</option>
        <option value="ladies">👗 Ladies Wear</option>
        <option value="kids">👶 Kids Wear</option>
      </select>
    </div>
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" id="product-name" placeholder="e.g., Kanchipuram Silk Saree">
    </div>
    <div class="form-group">
      <label>Price (₹)</label>
      <input type="number" id="product-price" placeholder="e.g., 2500">
    </div>

    <div class="form-group" style="margin-top: 20px; border-top: 2px dashed #ddd; padding-top: 15px;">
      <label>Product Colors & Images</label>
      <div id="add-variant-container"></div>
      <button type="button" class="btn-add-variant" id="btn-add-row">➕ Add Another Color</button>
    </div>

    <button class="btn btn-primary" id="save-btn" style="width: 100%; padding: 12px; font-size: 16px;">💾 Save Product & Upload All</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="all">All Products</button>
    <button class="tab-btn" data-tab="ladies">👗 Ladies</button>
    <button class="tab-btn" data-tab="kids">👶 Kids</button>
  </div>

  <div id="products-container" class="products-grid"></div>
  
  <div style="text-align: center; margin-bottom: 40px;">
    <button id="load-more-btn" class="btn btn-primary" style="display: none;">⬇️ Load More</button>
  </div>
</div>

<div class="modal" id="edit-modal">
  <div class="modal-box">
    <span class="modal-close" id="modal-close-btn">✕</span>
    <div class="modal-title">✏️ Edit Product</div>

    <input type="hidden" id="edit-id">

    <div class="form-group">
      <label>Section</label>
      <select id="edit-section">
        <option value="ladies">👗 Ladies Wear</option>
        <option value="kids">👶 Kids Wear</option>
      </select>
    </div>
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" id="edit-name">
    </div>
    <div class="form-group">
      <label>Price (₹)</label>
      <input type="number" id="edit-price">
    </div>

    <div class="form-group" style="margin-top: 20px; border-top: 2px dashed #ddd; padding-top: 15px;">
        <label>Manage Colors</label>
        <div id="edit-existing-colors" style="margin-bottom: 15px;"></div>

        <label style="font-size:12px; color:#666;">Add New Color:</label>
        <div id="edit-new-variants"></div>
        <button type="button" class="btn-add-variant" id="btn-edit-add-row">➕ Add Another Color</button>
    </div>

    <button class="btn btn-primary" id="save-edit-btn" style="width:100%;margin-top:8px;">💾 Save Changes</button>
  </div>
</div>

<script type="module" src="admin.js"></script>
</body>
</html>
